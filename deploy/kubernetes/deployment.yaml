apiVersion: apps/v1
kind: Deployment
metadata:
  name: gravtory-engine
  namespace: gravtory
  labels:
    app.kubernetes.io/name: gravtory
    app.kubernetes.io/component: engine
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: gravtory
      app.kubernetes.io/component: engine
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gravtory
        app.kubernetes.io/component: engine
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: gravtory
          image: gravtory:<IMAGE_TAG>
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "gravtory.cli.main", "workers", "start"]
          ports:
            - name: dashboard
              containerPort: 7777
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          envFrom:
            - configMapRef:
                name: gravtory-config
            - secretRef:
                name: gravtory-secrets
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /api/health
              port: dashboard
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: dashboard
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 5
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 5"]
      terminationGracePeriodSeconds: 30
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gravtory-dashboard
  namespace: gravtory
  labels:
    app.kubernetes.io/name: gravtory
    app.kubernetes.io/component: dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: gravtory
      app.kubernetes.io/component: dashboard
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gravtory
        app.kubernetes.io/component: dashboard
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: dashboard
          image: gravtory:<IMAGE_TAG>
          imagePullPolicy: IfNotPresent
          command: ["gravtory", "dashboard", "--host", "0.0.0.0", "--port", "7777"]
          ports:
            - name: http
              containerPort: 7777
              protocol: TCP
          envFrom:
            - configMapRef:
                name: gravtory-config
            - secretRef:
                name: gravtory-secrets
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
