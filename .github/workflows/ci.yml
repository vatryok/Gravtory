name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ── Stage 1: Lint (fast-fail gate) ──────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install tools
        run: pip install ruff mypy
      - name: Install gravtory (for type stubs)
        run: pip install -e ".[dev]"
      - name: Ruff check
        run: ruff check src/ tests/
      - name: Ruff format check
        run: ruff format --check src/ tests/
      - name: Mypy
run: mypy src/gravtory/ --ignore-missing-imports --no-warn-unused-ignores
  # ── Stage 2: Unit tests (matrix) ────────────────────────────────
  unit:
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run unit tests
        run: pytest tests/unit/ --cov=gravtory --cov-report=xml -q --benchmark-disable
      - name: Upload coverage
        if: matrix.python-version == '3.12' && matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v5
        with:
          file: ./coverage.xml
          flags: unit

  # ── Stage 3: Integration tests (backend matrix) ─────────────────
  integration:
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        backend: [sqlite, postgresql, mysql, mongodb, redis]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: ${{ matrix.backend == 'postgresql' && 'postgres:17' || '' }}
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: gravtory_test
        ports: ${{ matrix.backend == 'postgresql' && fromJson('["5432:5432"]') || fromJson('[]') }}
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      mysql:
        image: ${{ matrix.backend == 'mysql' && 'mysql:9' || '' }}
        env:
          MYSQL_ROOT_PASSWORD: test
          MYSQL_DATABASE: gravtory_test
        ports: ${{ matrix.backend == 'mysql' && fromJson('["3306:3306"]') || fromJson('[]') }}
        options: --health-cmd "mysqladmin ping" --health-interval 10s --health-timeout 5s --health-retries 5
      mongo:
        image: ${{ matrix.backend == 'mongodb' && 'mongo:8' || '' }}
        ports: ${{ matrix.backend == 'mongodb' && fromJson('["27017:27017"]') || fromJson('[]') }}
      redis:
        image: ${{ matrix.backend == 'redis' && 'redis:8' || '' }}
        ports: ${{ matrix.backend == 'redis' && fromJson('["6379:6379"]') || fromJson('[]') }}
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Install backend extras
        run: pip install -e ".[dev,postgres,mysql,mongodb,redis]"
      - name: Run integration tests
        run: pytest tests/integration/ -v --benchmark-disable

  # ── Stage 4: E2E tests ──────────────────────────────────────────
  e2e:
    needs: [unit, integration]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run E2E tests
        run: pytest tests/e2e/ -q --timeout=120 --benchmark-disable

  # ── Stage 5: Security scan (parallel with tests) ────────────────
  security:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install tools
        run: pip install pip-audit bandit
      - name: Install gravtory
        run: pip install -e ".[dev]"
      - name: pip-audit (dependency vulnerabilities)
        run: pip-audit -r requirements-lock.txt
      - name: bandit (SAST)
        run: bandit -r src/gravtory -ll -q

  # ── Stage 5b: Container image scan ─────────────────────────────
  container-scan:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Build Docker image
        run: docker build -t gravtory:ci .
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'gravtory:ci'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

  # ── Stage 6: Coverage gate ──────────────────────────────────────
  coverage:
    needs: unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run tests with coverage
        run: pytest tests/ --cov=gravtory --cov-report=term --cov-config=pyproject.toml -q --benchmark-disable
      - name: Enforce coverage threshold
        run: pytest tests/ --cov=gravtory --cov-config=pyproject.toml --cov-fail-under=95 -q --benchmark-disable
